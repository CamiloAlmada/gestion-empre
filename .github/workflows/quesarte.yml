name: quesarte

on:
  push:
    branches: [main]
    paths:
      - "apps/quesarte/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "package.json"
      - ".github/workflows/quesarte.yml"
  pull_request:
    paths:
      - "apps/quesarte/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "package.json"
      - ".github/workflows/quesarte.yml"

concurrency:
  group: quesarte-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verificar:
    name: Lint, test y build (verificación)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Lint, test y build (quesarte + deps)
        run: pnpm turbo lint test build --filter=quesarte...

  deploy-preview:
    name: Deploy preview (PR → quesarte-uy-dev)
    if: github.event_name == 'pull_request'
    needs: verificar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build (quesarte + deps) con config de Firebase dev
        run: pnpm turbo build --filter=quesarte...
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY_DEV }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN_DEV }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID_DEV }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET_DEV }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID_DEV }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID_DEV }}

      - name: Escribir credenciales de Firebase (service account dev)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUESARTE_UY_DEV }}' > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      # Nota: las firestore.rules / firestore.indexes.json del branch de este
      # PR se deployan al proyecto dev (quesarte-uy-dev), igual que el hosting
      # preview. Es aceptable: valida las reglas contra el proyecto de dev
      # antes del merge a main, que es cuando se deployan a producción
      # (quesarte-uy) en el job deploy-prod.
      - name: Deploy Firestore (rules + indexes) a dev
        working-directory: apps/quesarte
        run: npx --yes firebase-tools@15 deploy --only firestore --project quesarte-uy-dev --non-interactive

      - name: Deploy preview channel a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUESARTE_UY_DEV }}
          projectId: quesarte-uy-dev
          entryPoint: apps/quesarte

      - name: Borrar credenciales temporales de Firebase
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"

  deploy-prod:
    name: Deploy producción (main → quesarte-uy)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verificar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build (quesarte + deps) con config de Firebase prod
        run: pnpm turbo build --filter=quesarte...
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Escribir credenciales de Firebase (service account prod)
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUESARTE_UY }}' > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore (rules + indexes) a producción
        working-directory: apps/quesarte
        run: npx --yes firebase-tools@15 deploy --only firestore --project quesarte-uy --non-interactive

      - name: Deploy a producción en Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUESARTE_UY }}
          projectId: quesarte-uy
          entryPoint: apps/quesarte
          channelId: live

      - name: Borrar credenciales temporales de Firebase
        if: always()
        run: rm -f "$RUNNER_TEMP/firebase-sa.json"
