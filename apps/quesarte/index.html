<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-source.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback estático para cuando JS está deshabilitado (el script de
         abajo lo sobreescribe en el caso normal): color de --fondo del
         estado por defecto (Minimalista, light). Mismo valor que
         MAPA_THEME_COLOR.minimalista.light en
         apps/quesarte/src/componentes/MetaThemeColor.tsx. -->
    <meta name="theme-color" content="#f6f3ef" />
    <title>Quesarte</title>
    <script>
      // Anti-FOUC (docs/06-ui-ux.md §4): aplica tema + estilo guardados, y el
      // theme-color inicial que les corresponde, ANTES de que cargue el
      // bundle, para no parpadear con el tema del SO ni con un theme-color
      // desactualizado. Duplica la lectura que hacen ProveedorTema al montar
      // (packages/ui/src/ProveedorTema.tsx) y MetaThemeColor al montar
      // (apps/quesarte/src/componentes/MetaThemeColor.tsx), a propósito: esos
      // componentes no pueden correr a tiempo para evitar el primer paint. En
      // modo "system"/sin nada guardado no se fija data-theme (rige
      // `prefers-color-scheme` vía CSS); en estilo "minimalista"/sin nada
      // guardado tampoco se fija data-estilo.
      //
      // Extensión "Colores del negocio" (tercer eje, tanda TM): mismo
      // criterio, con el cache `localStorage['temaNegocio']` que escribe
      // `escribirCacheTemaNegocio` (packages/ui/src/temaNegocio.ts) — snippet
      // canónico documentado en packages/config/anti-fouc-tema-negocio.md
      // para portarlo a la próxima app.
      try {
        var temaGuardado = window.localStorage.getItem('tema');
        if (temaGuardado === 'light' || temaGuardado === 'dark') {
          document.documentElement.setAttribute('data-theme', temaGuardado);
        }

        var estiloGuardado = window.localStorage.getItem('estilo');
        if (estiloGuardado === 'calido') {
          document.documentElement.setAttribute('data-estilo', 'calido');
        }

        // Mismo mapa que MAPA_THEME_COLOR en
        // apps/quesarte/src/componentes/MetaThemeColor.tsx, duplicado a
        // propósito (ver comentario de ahí sobre cómo se calcularon ambos
        // estilos desde los --fondo-light/--fondo-dark reales de
        // packages/config/tailwind.css).
        var MAPA_THEME_COLOR = {
          minimalista: { light: '#f6f3ef', dark: '#040302' },
          calido: { light: '#f9efda', dark: '#100906' },
        };
        var estiloEfectivo = estiloGuardado === 'calido' ? 'calido' : 'minimalista';
        var prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var modoEfectivo =
          temaGuardado === 'light' || temaGuardado === 'dark'
            ? temaGuardado
            : prefiereOscuro
              ? 'dark'
              : 'light';

        // BEGIN anti-fouc-tema-negocio (snippet canónico, ver
        // packages/config/anti-fouc-tema-negocio.md — copiar tal cual a la
        // próxima app, requiere `modoEfectivo` ya calculado arriba).
        var colorTemaNegocio = null;
        var cacheTemaNegocio = window.localStorage.getItem('temaNegocio');
        if (cacheTemaNegocio) {
          var datosTemaNegocio = JSON.parse(cacheTemaNegocio);
          if (
            datosTemaNegocio &&
            datosTemaNegocio.v === 1 &&
            typeof datosTemaNegocio.css === 'string' &&
            datosTemaNegocio.css.indexOf(':root[data-tema-negocio]') === 0 &&
            datosTemaNegocio.css.indexOf('</style') === -1
          ) {
            var styleTemaNegocio = document.createElement('style');
            styleTemaNegocio.id = 'tema-negocio';
            styleTemaNegocio.textContent = datosTemaNegocio.css;
            document.head.appendChild(styleTemaNegocio);
            document.documentElement.setAttribute('data-tema-negocio', '');

            var hexTemaNegocio = datosTemaNegocio.themeColor && datosTemaNegocio.themeColor[modoEfectivo];
            if (typeof hexTemaNegocio === 'string' && /^#[0-9a-f]{6}$/i.test(hexTemaNegocio)) {
              colorTemaNegocio = hexTemaNegocio;
            }
          }
        }
        // END anti-fouc-tema-negocio

        var metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute(
            'content',
            colorTemaNegocio || MAPA_THEME_COLOR[estiloEfectivo][modoEfectivo],
          );
        }
      } catch (error) {
        // localStorage/matchMedia no disponible (modo privado, contexto
        // restringido): se pierde el anti-FOUC en este caso, pero
        // ProveedorTema y MetaThemeColor siguen aplicando los valores por
        // defecto una vez que React monte.
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
